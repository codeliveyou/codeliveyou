name: Update README cards

on:
  push:
    branches: [main]
    paths-ignore:
      - "profile/**"
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # Prefer a classic PAT with read:user (repo secret STATS_PAT) if the default token hits limits.
      PAT_1: ${{ secrets.STATS_PAT || secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Render profile/stats.svg and profile/top-langs.svg
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          WORKSPACE: ${{ github.workspace }}
        run: npm run render-cards

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/stats.svg profile/top-langs.svg
          git commit -m "chore: update README stat cards" || exit 0
          git push
